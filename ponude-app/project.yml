name: Ponude
options:
  bundleIdPrefix: hr.lotusrc
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Ponude:
    type: application
    platform: macOS
    sources:
      - path: Ponude
        excludes:
          - "Resources/**"
    resources:
      - path: Ponude/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: hr.lotusrc.ponude
        INFOPLIST_KEY_CFBundleDisplayName: Ponude
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
        INFOPLIST_KEY_NSHighResolutionCapable: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Ponude
        COMBINE_HIDPI_IMAGES: true
        # Network entitlement for Sudreg API
        CODE_SIGN_ENTITLEMENTS: Ponude/Ponude.entitlements
    dependencies:
      - package: Sparkle
    entitlements:
      path: Ponude/Ponude.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

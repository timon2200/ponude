name: Build & Release Ponude

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version numbering

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve dependencies
        working-directory: ponude-app
        run: swift package resolve

      - name: Build release
        working-directory: ponude-app
        run: |
          chmod +x build_app.sh
          ./build_app.sh --for-release

      - name: Get version info
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Sign update with Sparkle EdDSA
        id: sparkle_sign
        working-directory: ponude-app
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ZIP_FILE="build/Ponude-${{ steps.version.outputs.version }}.zip"
          
          # Import private key into keychain for sign_update tool
          SIGN_TOOL=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          
          # Sign the zip and capture the signature attributes
          SIGN_OUTPUT=$("$SIGN_TOOL" "$ZIP_FILE" --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY") 2>&1)
          echo "sign_attrs=$SIGN_OUTPUT" >> $GITHUB_OUTPUT
          echo "Sparkle signature: $SIGN_OUTPUT"

      - name: Generate appcast.xml
        working-directory: ponude-app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_FILE="Ponude-${VERSION}.zip"
          ZIP_SIZE=$(stat -f%z "build/$ZIP_FILE")
          SIGN_ATTRS='${{ steps.sparkle_sign.outputs.sign_attrs }}'
          
          # Parse edSignature and length from sign_attrs  
          # Format: sparkle:edSignature="..." length="..."
          ED_SIG=$(echo "$SIGN_ATTRS" | grep -o 'sparkle:edSignature="[^"]*"' | head -1 || echo "")
          LENGTH_ATTR=$(echo "$SIGN_ATTRS" | grep -o 'length="[^"]*"' | head -1 || echo "length=\"$ZIP_SIZE\"")
          
          DOWNLOAD_URL="https://github.com/timon2200/ponude/releases/download/${TAG}/${ZIP_FILE}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S %z")
          
          cat > build/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Ponude Updates</title>
              <description>Najnovija verzija aplikacije Ponude.</description>
              <language>hr</language>
              <item>
                <title>Ponude ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="${DOWNLOAD_URL}"
                           type="application/octet-stream"
                           ${ED_SIG}
                           ${LENGTH_ATTR} />
              </item>
            </channel>
          </rss>
          EOF
          
          echo "✅ appcast.xml generated:"
          cat build/appcast.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ponude ${{ steps.version.outputs.version }}"
          body: |
            ## Ponude ${{ steps.version.outputs.version }}
            
            ### Installation
            1. Download `Ponude-${{ steps.version.outputs.version }}.zip`
            2. Extract and move `Ponude.app` to your Applications folder
            3. Right-click → Open (first time only)
            
            ### Auto-Update
            If you already have Ponude installed, the app will automatically notify you of this update.
          files: |
            ponude-app/build/Ponude-${{ steps.version.outputs.version }}.zip
            ponude-app/build/appcast.xml
          draft: false
          prerelease: false

name: Build & Release Ponude

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version numbering

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve dependencies
        working-directory: ponude-app
        run: swift package resolve

      - name: Build release
        working-directory: ponude-app
        run: |
          chmod +x build_app.sh
          ./build_app.sh --for-release

      - name: Get version info
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Sign update with Sparkle EdDSA
        id: sparkle_sign
        working-directory: ponude-app
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ZIP_FILE="build/Ponude-${{ steps.version.outputs.version }}.zip"
          SIGN_TOOL=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "⚠️ SPARKLE_PRIVATE_KEY secret not set, skipping signing"
            echo "sign_attrs=" >> $GITHUB_OUTPUT
          else
            # Sign the zip using stdin for the private key
            SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_TOOL" --ed-key-file - "$ZIP_FILE" 2>&1)
            echo "sign_attrs=$SIGN_OUTPUT" >> $GITHUB_OUTPUT
            echo "✅ Sparkle signature: $SIGN_OUTPUT"
          fi

      - name: Generate appcast.xml
        working-directory: ponude-app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_FILE="Ponude-${VERSION}.zip"
          ZIP_SIZE=$(stat -f%z "build/$ZIP_FILE")
          SIGN_ATTRS="${{ steps.sparkle_sign.outputs.sign_attrs }}"
          
          DOWNLOAD_URL="https://github.com/timon2200/ponude/releases/download/${TAG}/${ZIP_FILE}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S %z")
          
          # Build the enclosure attributes
          ENCLOSURE_ATTRS="url=\"${DOWNLOAD_URL}\" type=\"application/octet-stream\" length=\"${ZIP_SIZE}\""
          
          # Add Sparkle signature if available
          if [ -n "$SIGN_ATTRS" ]; then
            # Extract edSignature from the sign_update output
            ED_SIG=$(echo "$SIGN_ATTRS" | grep -oE 'sparkle:edSignature="[^"]*"' || echo "")
            if [ -n "$ED_SIG" ]; then
              ENCLOSURE_ATTRS="$ENCLOSURE_ATTRS $ED_SIG"
            fi
          fi
          
          cat > build/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Ponude Updates</title>
              <description>Najnovija verzija aplikacije Ponude.</description>
              <language>hr</language>
              <item>
                <title>Ponude ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure ${ENCLOSURE_ATTRS} />
              </item>
            </channel>
          </rss>
          EOF
          
          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' build/appcast.xml
          
          echo "✅ appcast.xml generated:"
          cat build/appcast.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ponude ${{ steps.version.outputs.version }}"
          body: |
            ## Ponude ${{ steps.version.outputs.version }}
            
            ### Instalacija
            1. Preuzmi `Ponude-${{ steps.version.outputs.version }}.zip`
            2. Raspakiraj i premjesti `Ponude.app` u Applications mapu
            3. Desni klik → Otvori (samo prvi put)
            
            ### Automatska ažuriranja
            Ako već koristite Ponude, aplikacija će vas automatski obavijestiti o novoj verziji.
          files: |
            ponude-app/build/Ponude-${{ steps.version.outputs.version }}.zip
            ponude-app/build/appcast.xml
          draft: false
          prerelease: false
